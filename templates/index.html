<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neuro Disease App</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">

  <style>
    :root{
      --bg0:#070A14;
      --bg1:#0B1020;

      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.12);

      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);

      --accent:#7c3aed;
      --accent2:#60a5fa;
      --ring: rgba(124,58,237,.35);

      --shadow: 0 24px 70px rgba(0,0,0,.45);
      --radius: 18px;
      --t: 220ms cubic-bezier(.2,.8,.2,1);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background: linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
    }

    .bg{
      position:fixed; inset:0; z-index:-2;
      background:
        radial-gradient(900px 520px at 20% 20%, rgba(124,58,237,.18), transparent 62%),
        radial-gradient(700px 460px at 85% 18%, rgba(96,165,250,.12), transparent 62%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }
    .noise{
      position:fixed; inset:0; z-index:-1; pointer-events:none;
      opacity:.12;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.08) 1px, transparent 0);
      background-size: 28px 28px;
      mask-image: radial-gradient(900px 600px at 50% 40%, rgba(0,0,0,1), rgba(0,0,0,.25));
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding: 26px 16px;
    }

    .card{
      width:min(560px, 100%);
      border-radius:var(--radius);
      background: linear-gradient(180deg, var(--card), var(--card2));
      border:1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow:hidden;
      position:relative;
      transform: translateY(10px);
      opacity:0;
      animation: in 420ms var(--t) forwards;
    }
    @keyframes in{ to{transform:translateY(0); opacity:1} }

    .card::before{
      content:"";
      position:absolute; inset:-2px;
      background:
        radial-gradient(700px 220px at 12% 0%, rgba(124,58,237,.18), transparent 55%),
        radial-gradient(620px 240px at 92% 0%, rgba(96,165,250,.12), transparent 55%);
      filter: blur(18px);
      opacity:.9;
      pointer-events:none;
    }

    .inner{ position:relative; padding:22px 22px 20px; }

    .top{
      display:flex;
      gap:12px;
      align-items:flex-start;
      margin-bottom:14px;
    }

    .mark{
      width:42px; height:42px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      display:grid;
      place-items:center;
      box-shadow: 0 14px 30px rgba(0,0,0,.25);
      flex:0 0 auto;
    }

    h1{
      margin:2px 0 2px;
      font-size:18px;
      letter-spacing:-.02em;
      line-height:1.2;
    }
    .sub{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
    }

    .divider{
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.14), transparent);
      margin:16px 0 16px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }
    @media (min-width:520px){
      .grid{ grid-template-columns: 1fr 1fr; }
    }

    .choice{ position:relative; }
    .choice input{
      position:absolute;
      opacity:0;
      pointer-events:none;
    }

    .tile{
      display:flex;
      gap:12px;
      padding:14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.14);
      cursor:pointer;
      user-select:none;
      min-height:78px;
      transition: transform var(--t), border-color var(--t), box-shadow var(--t), background var(--t);
      outline:none;
    }
    .tile:hover{
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.18);
      box-shadow: 0 16px 36px rgba(0,0,0,.26);
      background: rgba(0,0,0,.18);
    }
    .tile:focus-visible{
      box-shadow: 0 0 0 4px var(--ring), 0 16px 36px rgba(0,0,0,.26);
    }

    .icon{
      width:38px; height:38px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      display:grid;
      place-items:center;
      flex:0 0 auto;
      transition: transform var(--t), background var(--t), border-color var(--t);
    }

    .name{
      margin:0;
      font-size:14px;
      font-weight:800;
      letter-spacing:-.01em;
    }
    .desc{
      margin:3px 0 0;
      color: rgba(255,255,255,.60);
      font-size:12px;
      line-height:1.35;
    }

    .choice input:checked + .tile{
      border-color: rgba(124,58,237,.55);
      background: rgba(124,58,237,.08);
      box-shadow: 0 18px 44px rgba(124,58,237,.14);
      transform: translateY(-2px);
    }
    .choice input:checked + .tile .icon{
      transform: translateY(-1px) scale(1.03);
      background: linear-gradient(135deg, rgba(124,58,237,.92), rgba(96,165,250,.55));
      border-color: rgba(255,255,255,.16);
    }

    .actions{
      margin-top:14px;
      display:grid;
      gap:10px;
    }

    .btn{
      width:100%;
      border:0;
      border-radius:16px;
      padding:12px 14px;
      background: linear-gradient(135deg, var(--accent), rgba(96,165,250,.85));
      color:white;
      font-weight:800;
      font-size:14px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      box-shadow: 0 16px 36px rgba(124,58,237,.20);
      transition: transform var(--t), box-shadow var(--t), filter var(--t);
      position:relative;
      overflow:hidden;
    }
    .btn::before{
      content:"";
      position:absolute;
      inset:-40% -20%;
      background: radial-gradient(closest-side, rgba(255,255,255,.20), transparent 65%);
      transform: translateX(-35%);
      opacity:0;
      transition: opacity var(--t), transform 420ms var(--t);
    }
    .btn:hover{
      transform: translateY(-2px);
      filter: saturate(1.06);
      box-shadow: 0 20px 48px rgba(124,58,237,.26);
    }
    .btn:hover::before{
      opacity:1;
      transform: translateX(10%);
    }
    .btn:active{ transform: translateY(0) scale(.99); }
    .btn:focus-visible{
      outline:none;
      box-shadow: 0 0 0 4px var(--ring), 0 20px 48px rgba(124,58,237,.26);
    }
    .btn:disabled{
      opacity:.65;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
      filter:none;
    }

    .spinner{
      width:16px; height:16px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.32);
      border-top-color: rgba(255,255,255,.95);
      animation: spin 700ms linear infinite;
      display:none;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    @media (prefers-reduced-motion: reduce){
      *{ animation:none !important; transition:none !important; }
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <main class="wrap">
    <section class="card" aria-label="Sélection de dashboard">
      <div class="inner">
        <div class="top">
          <div class="mark" aria-hidden="true">
            <!-- simple icon -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 4c-2.2 0-4 1.8-4 4v.3C3.9 9 3 10.3 3 11.8c0 1.6 1 3 2.4 3.6V16c0 2.2 1.8 4 4 4h.2c.5 1.2 1.7 2 3.1 2 1.6 0 2.9-1 3.4-2.4.7.2 1.4.4 2 .4 2.2 0 4-1.8 4-4v-1c1-.7 1.6-1.8 1.6-3.1 0-1.6-1-3-2.5-3.6V8c0-2.2-1.8-4-4-4-1 0-1.9.3-2.6.9C14.2 4.3 13.1 4 12 4c-1.1 0-2.2.3-3 .9"
                    stroke="rgba(255,255,255,.85)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9 8v8M12 7v10M15 8v8" stroke="rgba(255,255,255,.35)" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <h1>Neuro Disease</h1>
            <p class="sub">Choisis une option pour ouvrir le dashboard correspondant.</p>
          </div>
        </div>

        <div class="divider" aria-hidden="true"></div>

        <form id="diseaseForm">
          <div class="grid" role="radiogroup" aria-label="Choix de la maladie">
            <label class="choice">
              <input type="radio" name="disease" value="alzheimer" />
              <div class="tile" tabindex="0">
                <div class="icon" aria-hidden="true">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M9 4h6a2 2 0 0 1 2 2v2.2a2 2 0 1 0 0 3.6V16a2 2 0 0 1-2 2h-2.2a2 2 0 1 0-3.6 0H9a2 2 0 0 1-2-2v-2.2a2 2 0 1 0 0-3.6V6a2 2 0 0 1 2-2Z"
                          stroke="rgba(255,255,255,.85)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <div>
                  <p class="name">Alzheimer</p>
                  <p class="desc">Suivi et insights.</p>
                </div>
              </div>
            </label>

            <label class="choice">
              <input type="radio" name="disease" value="parkinson" />
              <div class="tile" tabindex="0">
                <div class="icon" aria-hidden="true">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M3 12h4l2-5 4 10 2-5h6"
                          stroke="rgba(255,255,255,.85)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <div>
                  <p class="name">Parkinson</p>
                  <p class="desc">Analyse du parcours.</p>
                </div>
              </div>
            </label>
          </div>

          <div class="actions">
            <button id="goBtn" class="btn" type="submit" disabled>
              <span class="spinner" aria-hidden="true"></span>
              <span id="btnText">Continuer</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 12h12" stroke="rgba(255,255,255,.92)" stroke-width="2" stroke-linecap="round"/>
                <path d="M13 6l6 6-6 6" stroke="rgba(255,255,255,.92)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </form>

      </div>
    </section>
  </main>

  <script>
    (function () {
      const form = document.getElementById("diseaseForm");
      const btn = document.getElementById("goBtn");
      const btnText = document.getElementById("btnText");
      const spinner = document.querySelector(".spinner");
      const radios = Array.from(document.querySelectorAll('input[name="disease"]'));
      const tiles = Array.from(document.querySelectorAll(".tile"));

      const routes = {
        alzheimer: "/dashboard",
        parkinson: "/dashboardparkinson",
      };

      const selected = () => radios.find(r => r.checked)?.value || "";

      const setLoading = (on) => {
        btn.disabled = on;
        spinner.style.display = on ? "inline-block" : "none";
        btnText.textContent = on ? "Ouverture…" : "Continuer";
      };

      const refresh = () => { btn.disabled = !selected(); };

      radios.forEach(r => r.addEventListener("change", refresh));

      // Keyboard support on tiles (Enter / Space + arrows)
      tiles.forEach((tile, i) => {
        tile.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            radios[i].checked = true;
            refresh();
          }
          if (e.key === "ArrowRight" || e.key === "ArrowDown") {
            e.preventDefault();
            const next = (i + 1) % radios.length;
            radios[next].checked = true;
            tiles[next].focus();
            refresh();
          }
          if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
            e.preventDefault();
            const prev = (i - 1 + radios.length) % radios.length;
            radios[prev].checked = true;
            tiles[prev].focus();
            refresh();
          }
        });
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const v = selected();
        const target = routes[v];
        if (!target) return;

        setLoading(true);
        setTimeout(() => { window.location.href = target; }, 280);
      });

      refresh();
    })();
  </script>
</body>
</html>
